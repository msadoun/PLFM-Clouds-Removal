name: Dependency Health

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

jobs:
  dependency-health:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies and print versions
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import rasterio, tensorflow as tf, tensorflow_addons as tfa, skimage, sewar; print('rasterio', rasterio.__version__); print('tf', tf.__version__); print('tfa', tfa.__version__); print('skimage', skimage.__version__); print('sewar', sewar.__version__ if hasattr(sewar, '__version__') else 'ok')"
