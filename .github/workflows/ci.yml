name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import smoke check
        run: |
          python -c "import rasterio, tensorflow as tf, tensorflow_addons as tfa; print('rasterio', rasterio.__version__); print('tf', tf.__version__); print('tfa', tfa.__version__)"
          python -c "from models.PLFM import PLFM; PLFM('weights'); print('PLFM init OK')"

      - name: Generate tiny raw dataset
        run: |
          python - <<'PY'
          from pathlib import Path
          import numpy as np
          import rasterio
          from rasterio.transform import from_origin

          root = Path("ci_raw_data")
          for sub in ["clear", "cloudy", "sar"]:
              (root / sub).mkdir(parents=True, exist_ok=True)

          transform = from_origin(0, 0, 1, 1)
          profile_rgb = {
              "driver": "GTiff",
              "height": 256,
              "width": 256,
              "count": 3,
              "dtype": "float32",
              "transform": transform,
          }
          profile_sar = {
              "driver": "GTiff",
              "height": 256,
              "width": 256,
              "count": 1,
              "dtype": "float32",
              "transform": transform,
          }

          for i in range(1, 5):
              idx = f"{i:04d}"
              clear = np.random.rand(3, 256, 256).astype("float32")
              cloudy = np.clip(clear + np.random.normal(0, 0.08, clear.shape).astype("float32"), 0, 1)
              sar = np.random.rand(1, 256, 256).astype("float32")

              with rasterio.open(root / "clear" / f"clear_scene_{idx}.tif", "w", **profile_rgb) as dst:
                  dst.write(clear)
              with rasterio.open(root / "cloudy" / f"cloudy_scene_{idx}.tif", "w", **profile_rgb) as dst:
                  dst.write(cloudy)
              with rasterio.open(root / "sar" / f"sar_scene_{idx}.tif", "w", **profile_sar) as dst:
                  dst.write(sar)
          PY

      - name: Preprocess and validate
        run: |
          python preprocess.py --raw_data ci_raw_data --output ci_dataset --tile_size 256
          python validate_dataset.py --dataset ci_dataset --sequence_size 3

      - name: CLI smoke
        run: |
          python main.py
