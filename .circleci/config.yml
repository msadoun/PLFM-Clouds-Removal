version: 2.1

jobs:
  ci-smoke:
    docker:
      - image: cimg/python:3.9
    resource_class: large
    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-pip-{{ arch }}-{{ checksum "requirements.txt" }}
            - v1-pip-{{ arch }}

      - run:
          name: Install dependencies
          command: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt

      - save_cache:
          key: v1-pip-{{ arch }}-{{ checksum "requirements.txt" }}
          paths:
            - ~/.cache/pip

      - run:
          name: Import smoke check
          command: |
            python -c "import rasterio, tensorflow as tf, tensorflow_addons as tfa; print('rasterio', rasterio.__version__); print('tf', tf.__version__); print('tfa', tfa.__version__)"
            python -c "from models.PLFM import PLFM; PLFM('weights'); print('PLFM init OK')"

      - run:
          name: Generate tiny raw dataset
          command: |
            python scripts/generate_ci_raw_data.py

      - run:
          name: Preprocess and validate
          command: |
            python preprocess.py --raw_data ci_raw_data --output ci_dataset --tile_size 256
            python validate_dataset.py --dataset ci_dataset --sequence_size 3

      - run:
          name: CLI smoke
          command: |
            python main.py || true

  docker-build:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Build Docker image
          command: docker build -t plfm-ci .

workflows:
  ci:
    jobs:
      - ci-smoke
      - docker-build
